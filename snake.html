<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
  }
  h1 { font-size: 2rem; margin-bottom: 10px; color: #0f3460; text-shadow: 0 0 10px #16213e; }
  #scoreboard {
    display: flex;
    gap: 40px;
    margin-bottom: 14px;
    font-size: 1.1rem;
  }
  #scoreboard span { color: #e94560; font-weight: bold; }
  canvas {
    border: 3px solid #16213e;
    border-radius: 6px;
    box-shadow: 0 0 30px rgba(233,69,96,0.3);
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #overlay h2 { font-size: 2rem; color: #e94560; }
  #overlay p { font-size: 1rem; color: #aaa; }
  button {
    padding: 10px 30px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #c73652; }
  #tip { margin-top: 12px; font-size: 0.85rem; color: #555; }
</style>
</head>
<body>
<h1>贪吃蛇</h1>
<div id="scoreboard">
  得分：<span id="score">0</span>
  &nbsp;&nbsp;最高：<span id="best">0</span>
</div>
<div style="position:relative">
  <canvas id="c" width="400" height="400"></canvas>
  <div id="overlay">
    <h2 id="msg">贪吃蛇</h2>
    <p id="sub">用方向键或 WASD 控制</p>
    <button id="btn">开始游戏</button>
  </div>
</div>
<div id="tip">↑ ↓ ← → 或 W A S D 控制方向 &nbsp;|&nbsp; P 暂停</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const msgEl = document.getElementById('msg');
const subEl = document.getElementById('sub');
const btn = document.getElementById('btn');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

const COLS = 20, ROWS = 20;
const W = canvas.width / COLS, H = canvas.height / ROWS;

let snake, dir, nextDir, food, score, best = 0, running = false, paused = false, timer;

function rand(n) { return Math.floor(Math.random() * n); }

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let f;
  do { f = { x: rand(COLS), y: rand(ROWS) }; } while (occupied.has(`${f.x},${f.y}`));
  return f;
}

function init() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  food = placeFood();
  score = 0;
  scoreEl.textContent = 0;
}

function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 撞墙
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  // 撞自身
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    food = placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  // Background
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = '#16213e';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      ctx.fillRect(c * W + W/2 - 1, r * H + H/2 - 1, 2, 2);

  // Food
  const fx = food.x * W, fy = food.y * H;
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(fx + W/2, fy + H/2, W/2 - 2, 0, Math.PI * 2);
  ctx.fill();
  // shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(fx + W/2 - 2, fy + H/2 - 2, W/5, 0, Math.PI * 2);
  ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const r = Math.round(80 + (1 - t) * 80);
    const g = Math.round(200 - t * 60);
    const b = Math.round(80 + t * 60);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const pad = i === 0 ? 1 : 2;
    const radius = 4;
    const x = seg.x * W + pad, y = seg.y * H + pad;
    const w = W - pad*2, h = H - pad*2;
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.arcTo(x + w, y, x + w, y + radius, radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.arcTo(x + w, y + h, x + w - radius, y + h, radius);
    ctx.lineTo(x + radius, y + h);
    ctx.arcTo(x, y + h, x, y + h - radius, radius);
    ctx.lineTo(x, y + radius);
    ctx.arcTo(x, y, x + radius, y, radius);
    ctx.closePath();
    ctx.fill();

    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = '#fff';
      const ex = seg.x * W + W/2, ey = seg.y * H + H/2;
      const offsets = dir.x !== 0
        ? [{ dx: dir.x*2, dy: -3 }, { dx: dir.x*2, dy: 3 }]
        : [{ dx: -3, dy: dir.y*2 }, { dx: 3, dy: dir.y*2 }];
      offsets.forEach(o => {
        ctx.beginPath();
        ctx.arc(ex + o.dx, ey + o.dy, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(ex + o.dx + dir.x, ey + o.dy + dir.y, 1, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
      });
    }
  });

  // Paused overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂停', canvas.width/2, canvas.height/2);
    ctx.textAlign = 'left';
  }
}

function gameOver() {
  clearInterval(timer);
  running = false;
  msgEl.textContent = '游戏结束';
  subEl.textContent = `得分：${score}`;
  btn.textContent = '再来一局';
  overlay.style.display = 'flex';
}

function startGame() {
  init();
  overlay.style.display = 'none';
  running = true;
  paused = false;
  clearInterval(timer);
  const speed = 150;
  timer = setInterval(step, speed);
  draw();
}

btn.addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  const keys = {
    ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
  };
  if (e.key === 'p' || e.key === 'P') {
    if (!running) return;
    paused = !paused;
    if (paused) { clearInterval(timer); draw(); }
    else { timer = setInterval(step, 150); }
    return;
  }
  const newDir = keys[e.key];
  if (!newDir || !running || paused) return;
  // 禁止反向
  if (newDir.x === -dir.x && newDir.y === -dir.y) return;
  nextDir = newDir;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});

// Initial draw
draw();
</script>
</body>
</html>
